name: MacPass macOS Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build MacPass.app
    runs-on: macos-15-intel

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Select Xcode 16.4
        run: sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer

      - name: Bootstrap Carthage
        env:
          GITHUB_ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          carthage bootstrap --platform macOS --no-build
          rm -f Carthage/Checkouts/KeePassKit/KeePassKit.xcodeproj/xcshareddata/xcschemes/KeePassKit\ iOS.xcscheme
          rm -f Carthage/Checkouts/KeePassKit/KeePassKit.xcodeproj/xcshareddata/xcschemes/KeePassKit\ tvOS.xcscheme
          rm -f Carthage/Checkouts/KeePassKit/KeePassKit.xcodeproj/xcshareddata/xcschemes/KeePassKit\ watchOS.xcscheme
          rm -f Carthage/Checkouts/KissXML/KissXML.xcodeproj/xcshareddata/xcschemes/KissXML\ \(iOS\).xcscheme
          rm -f Carthage/Checkouts/TransformerKit/TransformerKit.xcodeproj/xcshareddata/xcschemes/TransformerKit\ iOS.xcscheme
          sed -i '' 's/@import Darwin\.Availability;/#import <Availability.h>/' Carthage/Checkouts/TransformerKit/Sources/NSValueTransformerName.h
          sed -i '' 's/@import Darwin\.Availability;/#import <Availability.h>/' Carthage/Checkouts/TransformerKit/Sources/NSValueTransformer+TransformerKit.m
          sed -i '' 's/@import Darwin\.C\.time;/#include <time.h>/' Carthage/Checkouts/TransformerKit/Sources/TTTDateTransformers.m
          sed -i '' 's/@import Darwin\.C\.xlocale;/#include <xlocale.h>/' Carthage/Checkouts/TransformerKit/Sources/TTTDateTransformers.m
          sed -i '' '/#import <TransformerKit\/TTTDataTransformers.h>/d' Carthage/Checkouts/TransformerKit/Sources/TransformerKit.h
          sed -i '' '/#import <TransformerKit\/TTTCryptographyTransformers.h>/d' Carthage/Checkouts/TransformerKit/Sources/TransformerKit.h
          set +e
          carthage build --platform macOS
          status=$?
          if [ $status -ne 0 ]; then
            find "${TMPDIR:-/tmp}" -name 'carthage-xcodebuild*.log' -type f -print -exec tail -n 300 {} \;
          fi
          exit $status

      - name: Install xcpretty
        run: gem install xcpretty --no-document --quiet

      - name: Build
        run: |
          set +e
          xcodebuild build \
            -configuration Release \
            -project MacPass.xcodeproj \
            -scheme MacPass \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            NO_SPARKLE=NO_SPARKLE \
            -derivedDataPath ./build > xcodebuild.log 2>&1
          status=$?
          xcpretty -c < xcodebuild.log
          if [ $status -ne 0 ]; then
            cat xcodebuild.log
          fi
          exit $status

      - name: Package
        run: |
          cd ./build/Build/Products/Release
          codesign --force --deep --sign - MacPass.app
          codesign --verify --deep --strict --verbose=2 MacPass.app
          zip -9ry MacPass-continuous.zip MacPass.app
          shasum -a 256 MacPass-continuous.zip > MacPass-continuous.zip.sha256

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v6
        with:
          name: MacPass-${{ github.sha }}
          path: |
            ./build/Build/Products/Release/MacPass-continuous.zip
            ./build/Build/Products/Release/MacPass-continuous.zip.sha256
          if-no-files-found: error
          retention-days: 30
