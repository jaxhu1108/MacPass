name: Nightly

on:
  #push:
  #  branches: [ master ]
  #pull_request:
  #  branches: [ master ]
  schedule:
    - cron: "0 23 * * *"

  workflow_dispatch:

jobs:
  nightly:
    runs-on: macos-15-intel

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Bootstrap Carthage
        env:
          GITHUB_ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          carthage bootstrap --platform macOS --no-build
          rm -f Carthage/Checkouts/KeePassKit/KeePassKit.xcodeproj/xcshareddata/xcschemes/KeePassKit\ iOS.xcscheme
          rm -f Carthage/Checkouts/KeePassKit/KeePassKit.xcodeproj/xcshareddata/xcschemes/KeePassKit\ tvOS.xcscheme
          rm -f Carthage/Checkouts/KeePassKit/KeePassKit.xcodeproj/xcshareddata/xcschemes/KeePassKit\ watchOS.xcscheme
          rm -f Carthage/Checkouts/KissXML/KissXML.xcodeproj/xcshareddata/xcschemes/KissXML\ \(iOS\).xcscheme
          sed -i '' 's/@import Darwin\.Availability;/#import <Availability.h>/' Carthage/Checkouts/TransformerKit/Sources/NSValueTransformerName.h
          sed -i '' 's/@import Darwin\.Availability;/#import <Availability.h>/' Carthage/Checkouts/TransformerKit/Sources/NSValueTransformer+TransformerKit.m
          sed -i '' 's/@import Darwin\.C\.time;/#include <time.h>/' Carthage/Checkouts/TransformerKit/Sources/TTTDateTransformers.m
          sed -i '' 's/@import Darwin\.C\.xlocale;/#include <xlocale.h>/' Carthage/Checkouts/TransformerKit/Sources/TTTDateTransformers.m
          sed -i '' '/#import <TransformerKit\/TTTDataTransformers.h>/d' Carthage/Checkouts/TransformerKit/Sources/TransformerKit.h
          sed -i '' '/#import <TransformerKit\/TTTCryptographyTransformers.h>/d' Carthage/Checkouts/TransformerKit/Sources/TransformerKit.h
          carthage build --platform macOS

      - name: Install xcpretty
        run: gem install xcpretty --no-document --quiet

      - name: Build
        run: |
          set -o pipefail
          xcodebuild clean
          xcodebuild build -configuration release -project MacPass.xcodeproj -scheme MacPass CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGN_ENTITLEMENTS="" -derivedDataPath ./build | xcpretty -c

      - name: Export Localizations
        run: |
          xcodebuild -project MacPass.xcodeproj -exportLocalizations -localizationPath Localisations -exportLanguage de 
          xcodebuild -project MacPass.xcodeproj -exportLocalizations -localizationPath Localisations -exportLanguage en
          xcodebuild -project MacPass.xcodeproj -exportLocalizations -localizationPath Localisations -exportLanguage es
          xcodebuild -project MacPass.xcodeproj -exportLocalizations -localizationPath Localisations -exportLanguage fr
          xcodebuild -project MacPass.xcodeproj -exportLocalizations -localizationPath Localisations -exportLanguage it
          xcodebuild -project MacPass.xcodeproj -exportLocalizations -localizationPath Localisations -exportLanguage nl
          xcodebuild -project MacPass.xcodeproj -exportLocalizations -localizationPath Localisations -exportLanguage ru
          xcodebuild -project MacPass.xcodeproj -exportLocalizations -localizationPath Localisations -exportLanguage sv-SE
          xcodebuild -project MacPass.xcodeproj -exportLocalizations -localizationPath Localisations -exportLanguage zh-Hans

      - name: Zip Localizations
        run: zip -9ry Localisations.zip Localisations

      - name: Package Release
        run: |
          cd ./build/Build/Products/Release
          zip -9ry MacPass-continuous.zip MacPass.app

      - name: Create SHA256 Hash
        run: |
          cd ./build/Build/Products/Release
          shasum -a 256 MacPass-continuous.zip > MacPass-continuous.zip.sha256

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v6
        with:
          name: MacPass-${{ github.sha }}
          path: |
            ./build/Build/Products/Release/MacPass-continuous.zip
            ./build/Build/Products/Release/MacPass-continuous.zip.sha256
            Localisations.zip
          if-no-files-found: error
          retention-days: 30

      #- name: Release
      #  uses: eine/tip@master
      #  with:
      #    token: ${{ secrets.GITHUB_TOKEN }}
      #    tag: continuous
      #    files: |
      #      Localisations.zip
      #      ./build/Build/Products/Release/MacPass-continuous.zip
      #      ./build/Build/Products/Release/MacPass-continuous.zip.sha256

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          tag_name: continuous
          files: |
            Localisations.zip
            ./build/Build/Products/Release/MacPass-continuous.zip
            ./build/Build/Products/Release/MacPass-continuous.zip.sha256